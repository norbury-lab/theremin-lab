<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コイル計算ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    color: #27262b;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    padding: 8px;
  }

  .container { max-width: 560px; }

  h2 {
    font-size: 18px;
    font-weight: 600;
    color: #27262b;
    margin-bottom: 4px;
  }

  .formula {
    font-size: 13px;
    color: #959396;
    margin-bottom: 24px;
    font-family: monospace;
  }

  .mode-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border: 1px solid #eeebee;
    border-radius: 4px;
    overflow: hidden;
  }
  .mode-btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    cursor: pointer;
    background: #f5f6fa;
    color: #959396;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .mode-btn.active {
    background: #7253ed;
    color: #fff;
    font-weight: 600;
  }

  .section {
    background: #f5f6fa;
    border: 1px solid #eeebee;
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #959396;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .field label {
    display: block;
    font-size: 13px;
    color: #5c5962;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .field input {
    background: #fff;
    border: 1px solid #eeebee;
    border-radius: 4px;
    color: #27262b;
    padding: 7px 10px;
    font-size: 16px;
    font-family: monospace;
    width: 110px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus {
    border-color: #7253ed;
  }
  .field .unit {
    color: #959396;
    font-size: 13px;
  }

  .result-section {
    background: #fff;
    border: 2px solid #7253ed;
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid #eeebee;
  }
  .result-row:last-of-type { border-bottom: none; }

  .result-label {
    font-size: 13px;
    color: #5c5962;
  }
  .result-value {
    font-size: 16px;
    font-family: monospace;
    color: #27262b;
  }
  .result-value.highlight {
    font-size: 22px;
    color: #7253ed;
    font-weight: 700;
  }
  .unit-small {
    font-size: 12px;
    color: #959396;
  }

  .machine-box {
    margin-top: 16px;
    background: #f5f6fa;
    border: 1px solid #eeebee;
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 13px;
    color: #5c5962;
    line-height: 2;
    font-family: monospace;
  }
  .machine-box strong {
    color: #7253ed;
  }

  .note {
    font-size: 12px;
    color: #959396;
    line-height: 1.8;
    margin-top: 8px;
  }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <h2>コイル計算ツール</h2>
  <div class="formula">Wheeler式：L = r²N² / (9r + 10l)　単層エアコア近似</div>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('reverse')">L → N（設計）</button>
    <button class="mode-btn" onclick="setMode('forward')">N → L（検算）</button>
  </div>

  <!-- 共通パラメーター -->
  <div class="section">
    <div class="section-title">共通パラメーター</div>
    <div class="input-grid">
      <div class="field">
        <label>巻き芯 直径</label>
        <div class="field-row">
          <input type="number" id="dia" value="40" step="0.1" min="1" oninput="calc()">
          <span class="unit">mm</span>
        </div>
      </div>
      <div class="field">
        <label>ワイヤー径</label>
        <div class="field-row">
          <input type="number" id="wire" value="0.30" step="0.01" min="0.01" oninput="calc()">
          <span class="unit">mm</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 設計モード入力 -->
  <div class="section" id="panel-reverse">
    <div class="section-title">目標インダクタンス</div>
    <div class="field">
      <label>目標 L</label>
      <div class="field-row">
        <input type="number" id="targetL" value="1000" step="10" min="1" oninput="calc()">
        <span class="unit">μH</span>
      </div>
    </div>
  </div>

  <!-- 検算モード入力 -->
  <div class="section hidden" id="panel-forward">
    <div class="section-title">巻き回数</div>
    <div class="field">
      <label>巻き回数 N</label>
      <div class="field-row">
        <input type="number" id="turns" value="237" step="1" min="1" oninput="calc()">
        <span class="unit">turns</span>
      </div>
    </div>
  </div>

  <!-- 結果 -->
  <div class="result-section">
    <div class="section-title">計算結果</div>

    <div id="result-reverse">
      <div class="result-row">
        <span class="result-label">巻き回数</span>
        <span class="result-value highlight" id="res-turns">— <span class="unit-small">turns</span></span>
      </div>
      <div class="result-row">
        <span class="result-label">巻き幅</span>
        <span class="result-value" id="res-width">— <span class="unit-small">mm</span></span>
      </div>
      <div class="result-row">
        <span class="result-label">検算 L</span>
        <span class="result-value" id="res-lcheck">— <span class="unit-small">μH</span></span>
      </div>
      <div class="machine-box">
        巻き機設定：<br>
        Single Layer Wraps = <strong id="ms-slw">—</strong><br>
        Axis Width = <strong id="ms-axis">—</strong> mm
      </div>
    </div>

    <div id="result-forward" class="hidden">
      <div class="result-row">
        <span class="result-label">インダクタンス</span>
        <span class="result-value highlight" id="res-L">— <span class="unit-small">μH</span></span>
      </div>
      <div class="result-row">
        <span class="result-label">巻き幅</span>
        <span class="result-value" id="res-width2">— <span class="unit-small">mm</span></span>
      </div>
      <div class="result-row">
        <span class="result-label">mH換算</span>
        <span class="result-value" id="res-mH">— <span class="unit-small">mH</span></span>
      </div>
    </div>
  </div>

  <div class="note">
    ※ Wheeler公式は単層エアコアの近似式。実測値との差異は試巻きで補正すること。<br>
    ※ 巻き幅 = N × ワイヤー径（密巻き前提）
  </div>

</div>

<script>
let mode = 'reverse';

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && m === 'reverse') || (i === 1 && m === 'forward'));
  });
  document.getElementById('panel-reverse').classList.toggle('hidden', m !== 'reverse');
  document.getElementById('panel-forward').classList.toggle('hidden', m !== 'forward');
  document.getElementById('result-reverse').classList.toggle('hidden', m !== 'reverse');
  document.getElementById('result-forward').classList.toggle('hidden', m !== 'forward');
  calc();
}

function wheeler(dia_mm, N, wire_mm) {
  const r = (dia_mm / 2) / 25.4;
  const l = (N * wire_mm) / 25.4;
  return (r * r * N * N) / (9 * r + 10 * l);
}

function solve(dia_mm, wire_mm, target_uH) {
  const r = (dia_mm / 2) / 25.4;
  const w = wire_mm / 25.4;
  const a = r * r;
  const b = -10 * w * target_uH;
  const c = -9 * r * target_uH;
  const disc = b * b - 4 * a * c;
  if (disc < 0) return null;
  return (-b + Math.sqrt(disc)) / (2 * a);
}

function calc() {
  const dia = parseFloat(document.getElementById('dia').value);
  const wire = parseFloat(document.getElementById('wire').value);

  if (mode === 'reverse') {
    const targetL = parseFloat(document.getElementById('targetL').value);
    if (!dia || !wire || !targetL) return;
    const N = solve(dia, wire, targetL);
    if (!N) return;
    const Nint = Math.round(N);
    const width = (Nint * wire).toFixed(1);
    const Lcheck = wheeler(dia, Nint, wire).toFixed(0);
    document.getElementById('res-turns').innerHTML = `${Nint} <span class="unit-small">turns</span>`;
    document.getElementById('res-width').innerHTML = `${width} <span class="unit-small">mm</span>`;
    document.getElementById('res-lcheck').innerHTML = `${Lcheck} <span class="unit-small">μH</span>`;
    document.getElementById('ms-slw').textContent = Nint;
    document.getElementById('ms-axis').textContent = width;
  } else {
    const N = parseFloat(document.getElementById('turns').value);
    if (!dia || !wire || !N) return;
    const L = wheeler(dia, N, wire);
    const width = (N * wire).toFixed(1);
    document.getElementById('res-L').innerHTML = `${L.toFixed(1)} <span class="unit-small">μH</span>`;
    document.getElementById('res-width2').innerHTML = `${width} <span class="unit-small">mm</span>`;
    document.getElementById('res-mH').innerHTML = `${(L / 1000).toFixed(4)} <span class="unit-small">mH</span>`;
  }
}

calc();
</script>
</body>
</html>
